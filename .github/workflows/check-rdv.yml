name: Check RDV

on:
    push:
    schedule:
        - cron: "*/1 * * * *"
    workflow_dispatch:

concurrency:
    group: check-rdv
    cancel-in-progress: true

jobs:
    check:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - run: pip install -r requirements.txt

            - run: python rendezvous.py
              env:
                  NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
